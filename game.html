<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tres en Raya - Russo Money</title>
    <meta name="theme-color" content="#4CAF50">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #4CAF50;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .back-btn:hover {
            border-color: #4CAF50;
            color: #4CAF50;
        }

        .scoreboard {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 400px;
        }

        .score-card {
            flex: 1;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: border-color 0.3s;
        }

        .score-card.active-x {
            border-color: #4CAF50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
        }

        .score-card.active-o {
            border-color: #2196F3;
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.2);
        }

        .score-card.draw-card {
            border-color: #555;
        }

        .score-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .score-player {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .score-player.x { color: #4CAF50; }
        .score-player.o { color: #2196F3; }
        .score-player.draw { color: #888; }

        .score-number {
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }

        .score-number.x { color: #4CAF50; }
        .score-number.o { color: #2196F3; }
        .score-number.draw { color: #666; }

        .status-bar {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 14px 28px;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            min-width: 280px;
            transition: all 0.3s;
        }

        .status-bar.turn-x { border-color: #4CAF50; color: #4CAF50; }
        .status-bar.turn-o { border-color: #2196F3; color: #2196F3; }
        .status-bar.win-x { border-color: #4CAF50; background: #0d2a0d; color: #4CAF50; }
        .status-bar.win-o { border-color: #2196F3; background: #0a1929; color: #2196F3; }
        .status-bar.draw { border-color: #888; color: #aaa; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 360px;
        }

        .cell {
            aspect-ratio: 1;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .cell:hover:not(.taken) {
            background: #222;
            border-color: #555;
            transform: scale(1.03);
        }

        .cell.taken {
            cursor: default;
        }

        .cell.x-mark {
            color: #4CAF50;
        }

        .cell.o-mark {
            color: #2196F3;
        }

        .cell.winning {
            border-color: #FFD700;
            background: #1a1800;
            animation: pulse-win 0.6s ease-in-out infinite alternate;
        }

        .cell.winning.x-mark {
            background: #0d2a0d;
            border-color: #4CAF50;
        }

        .cell.winning.o-mark {
            background: #0a1929;
            border-color: #2196F3;
        }

        @keyframes pulse-win {
            from { transform: scale(1); }
            to { transform: scale(1.06); }
        }

        @keyframes pop-in {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            70% { transform: scale(1.15) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .cell .mark {
            display: inline-block;
            animation: pop-in 0.25s ease-out forwards;
        }

        .buttons {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 360px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-new {
            background: #4CAF50;
            color: #000;
        }

        .btn-new:hover {
            background: #45a049;
            transform: translateY(-1px);
        }

        .btn-reset {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 2px solid #f44336;
        }

        .btn-reset:hover {
            background: #2a0a0a;
            transform: translateY(-1px);
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confetti-fall 2.5s ease-in forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 420px) {
            .cell { font-size: 42px; }
            .header h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <a class="back-btn" href="index.html">&#8592; Volver a la App</a>

    <div class="header">
        <h1>Tres en Raya</h1>
        <p>2 jugadores &bull; Gana quien primero haga tres en línea</p>
    </div>

    <!-- Marcador -->
    <div class="scoreboard">
        <div class="score-card active-x" id="cardX">
            <div class="score-label">Jugador</div>
            <div class="score-player x">X</div>
            <div class="score-number x" id="scoreX">0</div>
        </div>
        <div class="score-card draw-card" id="cardDraw">
            <div class="score-label">Empates</div>
            <div class="score-player draw">=</div>
            <div class="score-number draw" id="scoreDraw">0</div>
        </div>
        <div class="score-card" id="cardO">
            <div class="score-label">Jugador</div>
            <div class="score-player o">O</div>
            <div class="score-number o" id="scoreO">0</div>
        </div>
    </div>

    <!-- Estado del juego -->
    <div class="status-bar turn-x" id="statusBar">Turno de X</div>

    <!-- Tablero -->
    <div class="board" id="board">
        <div class="cell" onclick="handleClick(0)"></div>
        <div class="cell" onclick="handleClick(1)"></div>
        <div class="cell" onclick="handleClick(2)"></div>
        <div class="cell" onclick="handleClick(3)"></div>
        <div class="cell" onclick="handleClick(4)"></div>
        <div class="cell" onclick="handleClick(5)"></div>
        <div class="cell" onclick="handleClick(6)"></div>
        <div class="cell" onclick="handleClick(7)"></div>
        <div class="cell" onclick="handleClick(8)"></div>
    </div>

    <!-- Botones -->
    <div class="buttons">
        <button class="btn btn-new" onclick="newGame()">Nueva Partida</button>
        <button class="btn btn-reset" onclick="resetScores()">Reiniciar Puntaje</button>
    </div>

    <script>
        const WIN_COMBOS = [
            [0,1,2],[3,4,5],[6,7,8], // filas
            [0,3,6],[1,4,7],[2,5,8], // columnas
            [0,4,8],[2,4,6]          // diagonales
        ];

        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameOver = false;
        let scores = { X: 0, O: 0, D: 0 };

        function handleClick(index) {
            if (gameOver || board[index]) return;

            board[index] = currentPlayer;
            renderCell(index);

            const result = checkResult();

            if (result === 'win') {
                gameOver = true;
                scores[currentPlayer]++;
                updateScores();
                updateStatus('win');
                showConfetti();
            } else if (result === 'draw') {
                gameOver = true;
                scores.D++;
                updateScores();
                updateStatus('draw');
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updateStatus('turn');
                updateActiveCard();
            }
        }

        function renderCell(index) {
            const cell = document.querySelectorAll('.cell')[index];
            cell.classList.add('taken', currentPlayer === 'X' ? 'x-mark' : 'o-mark');
            cell.innerHTML = `<span class="mark">${currentPlayer}</span>`;
        }

        function checkResult() {
            for (const combo of WIN_COMBOS) {
                const [a, b, c] = combo;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    // Resaltar celdas ganadoras
                    combo.forEach(i => {
                        document.querySelectorAll('.cell')[i].classList.add('winning');
                    });
                    return 'win';
                }
            }
            if (board.every(cell => cell !== null)) return 'draw';
            return null;
        }

        function updateStatus(state) {
            const bar = document.getElementById('statusBar');
            bar.className = 'status-bar';

            if (state === 'turn') {
                bar.classList.add(currentPlayer === 'X' ? 'turn-x' : 'turn-o');
                bar.textContent = `Turno de ${currentPlayer}`;
            } else if (state === 'win') {
                bar.classList.add(currentPlayer === 'X' ? 'win-x' : 'win-o');
                bar.textContent = `¡Jugador ${currentPlayer} gana!`;
            } else if (state === 'draw') {
                bar.classList.add('draw');
                bar.textContent = '¡Empate!';
            }
        }

        function updateActiveCard() {
            document.getElementById('cardX').className = 'score-card' + (currentPlayer === 'X' ? ' active-x' : '');
            document.getElementById('cardO').className = 'score-card' + (currentPlayer === 'O' ? ' active-o' : '');
        }

        function updateScores() {
            document.getElementById('scoreX').textContent = scores.X;
            document.getElementById('scoreO').textContent = scores.O;
            document.getElementById('scoreDraw').textContent = scores.D;
            // Quitar borde activo al terminar la partida
            document.getElementById('cardX').className = 'score-card';
            document.getElementById('cardO').className = 'score-card';
        }

        function newGame() {
            board = Array(9).fill(null);
            gameOver = false;

            document.querySelectorAll('.cell').forEach(cell => {
                cell.className = 'cell';
                cell.innerHTML = '';
            });

            updateStatus('turn');
            updateActiveCard();
        }

        function resetScores() {
            if (!confirm('¿Reiniciar el marcador de puntajes?')) return;
            scores = { X: 0, O: 0, D: 0 };
            updateScores();
            newGame();
            currentPlayer = 'X';
            updateStatus('turn');
            updateActiveCard();
        }

        function showConfetti() {
            const colors = ['#4CAF50', '#2196F3', '#FFD700', '#FF9800', '#f44336', '#e91e63'];
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + 'vw';
                    piece.style.top = '-20px';
                    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                    piece.style.animationDelay = (Math.random() * 0.5) + 's';
                    piece.style.width = (8 + Math.random() * 8) + 'px';
                    piece.style.height = (8 + Math.random() * 8) + 'px';
                    container.appendChild(piece);
                }, i * 30);
            }

            setTimeout(() => container.remove(), 4000);
        }

        // Inicializar
        updateActiveCard();
    </script>
</body>
</html>
